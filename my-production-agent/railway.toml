[railway]
  (not set)

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  num_replicas = 1
  restart_policy_type = "ON_FAILURE"
  restart_policy_max_retries = 10
  wait_until_port_reachable = true

[environment]
  PORT = "8000"
  LOG_LEVEL = "INFO"
  RATE_LIMIT_PER_MINUTE = "20"
  MONTHLY_BUDGET_USD = "10"
