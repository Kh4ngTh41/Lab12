services:
  - type: web
    name: my-agent
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        value: redis://redis:6379
      - key: AGENT_API_KEY
        value: user1-secret-key
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_PER_MINUTE
        value: 20
      - key: MONTHLY_BUDGET_USD
        value: 10
